    function getComponentTypeInfo(component) {
        if (!component) return { icon: '●', iconClass: 'component', displayName: 'Component' };
        
        const componentType = component.componentType || '';
        const componentName = component.componentName || '';
        
        if (componentType.startsWith('IfcRel') || componentType.includes('Relation')) {
            return { icon: '↔', iconClass: 'component-relation', displayName: 'Relation' };
        } else if (componentType.includes('PropertySet') || componentName.startsWith('Pset_')) {
            return {
                icon: '<span class="icon-grid-pset" aria-hidden="true"><i></i><i></i><i></i><i></i></span>',
                iconClass: 'component-pset',
                displayName: 'PropertySet'
            };
        } else if (componentType.includes('ShapeRepresentation')) {
            return { icon: '▲', iconClass: 'component-shape', displayName: 'ShapeRep' };
        } else {
            return { icon: '●', iconClass: 'component-classdata', displayName: 'ClassData' };
        }
    }

    function createTreeItem({ type, label, guid, count, leaf = false, tooltip = '', component = null }) {
        const item = document.createElement('div');
        item.className = `tree-item${leaf ? ' leaf' : ''}`;
        item.dataset.type = type;
        if (guid) item.dataset.guid = guid;

        let icon, iconClass;
        let labelClass = '';
        
        if (type === 'entity') {
            icon = '⬡';
            iconClass = 'entity';
            labelClass = 'entity-name';
        } else if (type === 'component' && component) {
            const typeInfo = getComponentTypeInfo(component);
            icon = typeInfo.icon;
            iconClass = typeInfo.iconClass;
            labelClass = typeInfo.iconClass;
        } else {
            icon = type === 'component' ? '●' : '📦';
            iconClass = type === 'component' ? 'component' : '';
        }

        item.innerHTML = `
            <div class="tree-item-content" title="${tooltip}">
                <span class="tree-toggle"></span>
                <input type="checkbox" class="tree-checkbox">
                <span class="tree-icon ${iconClass}">${icon}</span>
                <span class="tree-label ${labelClass}">${label}</span>
                <span class="tree-count">${count !== undefined ? `(${count})` : ''}</span>
            </div>
        `;
        return item;
    }

    function attachTreeSelectionHandlers(item, onSelect) {
        const toggle = item.querySelector('.tree-toggle');
        if (toggle) {
            toggle.addEventListener('click', (e) => {
                e.stopPropagation();
                if (!item.classList.contains('leaf')) item.classList.toggle('expanded');
            });
        }

        item.addEventListener('click', (e) => {
            if (e.target.closest('.tree-toggle, .tree-checkbox')) return;
            e.stopPropagation();
            if (!item.classList.contains('leaf')) item.classList.toggle('expanded');
            onSelect();
        });
    }

    function renderTree() {
        const container = document.getElementById('treeContainer');
        const treeCount = document.getElementById('treeCount');
        container.innerHTML = '';

        const entityCount = state.flat.entities.size;
        const componentCount = state.flat.instancesById.size;
        treeCount.textContent = `${entityCount} entities, ${componentCount} components`;

        if (!entityCount) {
            container.innerHTML = '<div class="empty-state">Execute a query line to load data</div>';
            return;
        }

        const rootItem = createTreeItem({
            type: 'root',
            label: 'IFCxPrototype',
            guid: 'IFCxPrototype',
            count: componentCount,
            tooltip: 'All entities and components from all query lines'
        });
        rootItem.classList.add('expanded');

        const rootChildren = document.createElement('div');
        rootChildren.className = 'tree-children';

        const sortedEntities = Array.from(state.flat.entities.values()).sort((a, b) => a.entityGuid.localeCompare(b.entityGuid));

        sortedEntities.forEach(entityNode => {
            const componentGuidEntries = Array.from(entityNode.componentGuids.entries()).sort((a, b) => a[0].localeCompare(b[0]));
            const entityItem = createTreeItem({
                type: 'entity',
                label: entityNode.entityGuid,
                guid: entityNode.entityGuid,
                count: componentGuidEntries.length,
                tooltip: `Entity ${entityNode.entityGuid} (${componentGuidEntries.length} component GUIDs)`
            });
            entityItem.classList.add('expanded');

            const entityChildren = document.createElement('div');
            entityChildren.className = 'tree-children';

            componentGuidEntries.forEach(([componentGuid, instanceIds]) => {
                // Get the first instance to extract component metadata
                const firstInstance = state.flat.instancesById.get(instanceIds[0]);
                const component = firstInstance ? firstInstance.component : null;
                
                const componentItem = createTreeItem({
                    type: 'component',
                    label: componentGuid,
                    guid: componentGuid,
                    count: instanceIds.length,
                    leaf: true,
                    tooltip: `Component ${componentGuid} (${instanceIds.length} matching instances)`,
                    component: component
                });
                componentItem.dataset.instanceIds = JSON.stringify(instanceIds);

                const compCheckbox = componentItem.querySelector('.tree-checkbox');
                compCheckbox.checked = instanceIds.every(id => state.visibleInstanceIds.has(id));
                compCheckbox.addEventListener('change', (e) => {
                    if (e.target.checked) {
                        instanceIds.forEach(id => state.visibleInstanceIds.add(id));
                    } else {
                        instanceIds.forEach(id => state.visibleInstanceIds.delete(id));
                    }
                    updateMeshesForVisibility();
                    syncTreeCheckboxes();
                });

                attachTreeSelectionHandlers(componentItem, () => {
                    selectTreeItem('component', componentGuid);
                    renderDataViewForComponent(componentGuid);
                });

                entityChildren.appendChild(componentItem);
            });

            const entityCheckbox = entityItem.querySelector('.tree-checkbox');
            const allEntityInstanceIds = componentGuidEntries.flatMap(([, ids]) => ids);
            entityCheckbox.checked = allEntityInstanceIds.every(id => state.visibleInstanceIds.has(id));
            entityCheckbox.addEventListener('change', (e) => {
                if (e.target.checked) allEntityInstanceIds.forEach(id => state.visibleInstanceIds.add(id));
                else allEntityInstanceIds.forEach(id => state.visibleInstanceIds.delete(id));
                updateMeshesForVisibility();
                syncTreeCheckboxes();
            });

            attachTreeSelectionHandlers(entityItem, () => {
                selectTreeItem('entity', entityNode.entityGuid);
                renderDataViewForEntity(entityNode.entityGuid);
            });

            entityItem.appendChild(entityChildren);
            rootChildren.appendChild(entityItem);
        });

        const rootCheckbox = rootItem.querySelector('.tree-checkbox');
        rootCheckbox.checked = state.visibleInstanceIds.size === state.flat.instancesById.size;
        rootCheckbox.addEventListener('change', (e) => {
            if (e.target.checked) {
                state.flat.instancesById.forEach(instance => state.visibleInstanceIds.add(instance.instanceId));
            } else {
                state.visibleInstanceIds.clear();
            }
            updateMeshesForVisibility();
            syncTreeCheckboxes();
        });

        attachTreeSelectionHandlers(rootItem, () => {
            clearTreeAndMeshSelection();
            clearDataView();
        });

        rootItem.appendChild(rootChildren);
        container.appendChild(rootItem);
    }

    function syncTreeCheckboxes() {
        const container = document.getElementById('treeContainer');
        if (!container) return;

        container.querySelectorAll('.tree-item[data-type="component"]').forEach(item => {
            const ids = JSON.parse(item.dataset.instanceIds || '[]');
            const checkbox = item.querySelector('.tree-checkbox');
            checkbox.checked = ids.length > 0 && ids.every(id => state.visibleInstanceIds.has(id));
        });

        container.querySelectorAll('.tree-item[data-type="entity"]').forEach(item => {
            const guid = item.dataset.guid;
            const entityNode = state.flat.entities.get(guid);
            if (!entityNode) return;
            const ids = Array.from(entityNode.componentGuids.values()).flat();
            const checkbox = item.querySelector('.tree-checkbox');
            checkbox.checked = ids.length > 0 && ids.every(id => state.visibleInstanceIds.has(id));
        });

        const root = container.querySelector('.tree-item[data-type="root"]');
        if (root) {
            const rootCheckbox = root.querySelector('.tree-checkbox');
            rootCheckbox.checked = state.flat.instancesById.size > 0 && state.visibleInstanceIds.size === state.flat.instancesById.size;
        }
    }

    function clearTreeAndMeshSelection() {
        const selectedNodes = document.querySelectorAll('.tree-item.selected');
        selectedNodes.forEach(node => node.classList.remove('selected'));
        state.selectedEntityGuid = null;
        state.selectedComponentGuid = null;
        state.selectedInstanceId = null;
        clearMeshHighlights();
    }

    function findComponentTreeItemByInstanceId(instanceId) {
        if (!instanceId) return null;
        const componentItems = document.querySelectorAll('.tree-item[data-type="component"]');
        for (const item of componentItems) {
            const ids = JSON.parse(item.dataset.instanceIds || '[]');
            if (ids.includes(instanceId)) return item;
        }
        return null;
    }

    function selectTreeItem(type, guid, preferredInstanceId = null) {
        clearTreeAndMeshSelection();

        if (type === 'entity') {
            state.selectedEntityGuid = guid;
            const entityNode = state.flat.entities.get(guid);
            if (!entityNode) {
                applySelectionHighlight();
                return;
            }
            const allIds = Array.from(entityNode.componentGuids.values()).flat();
            const selectedId = allIds.find(id => state.visibleInstanceIds.has(id)) || null;
            if (!selectedId) {
                state.selectedInstanceId = null;
                clearMeshHighlights();
                return;
            }

            let item = null;
            const selector = `.tree-item[data-type="${type}"][data-guid="${cssEscape(guid)}"]`;
            item = document.querySelector(selector);
            if (item) {
                item.classList.add('selected');
                expandToItem(item);
                item.scrollIntoView({ block: 'center' });
            }

            state.selectedInstanceId = selectedId;
            applySelectionHighlight();
            return;
        }

        state.selectedComponentGuid = guid;
        const allInstanceIds = state.flat.componentsByGuid.get(guid) || [];
        if (!allInstanceIds.length) {
            state.selectedInstanceId = null;
            clearMeshHighlights();
            return;
        }

        let selectedId = null;
        if (preferredInstanceId && allInstanceIds.includes(preferredInstanceId)) {
            selectedId = state.visibleInstanceIds.has(preferredInstanceId) ? preferredInstanceId : null;
        } else {
            selectedId = allInstanceIds.find(id => state.visibleInstanceIds.has(id));
        }

        if (!selectedId) {
            state.selectedInstanceId = null;
            clearMeshHighlights();
            return;
        }

        let item = null;
        if (preferredInstanceId) {
            item = findComponentTreeItemByInstanceId(selectedId);
        }
        if (!item) {
            const selector = `.tree-item[data-type="${type}"][data-guid="${cssEscape(guid)}"]`;
            item = document.querySelector(selector);
        }
        if (item) {
            item.classList.add('selected');
            expandToItem(item);
            item.scrollIntoView({ block: 'center' });
        }

        state.selectedInstanceId = selectedId;
        applySelectionHighlight();
    }

    function cssEscape(value) {
        if (window.CSS && CSS.escape) return CSS.escape(value);
        return String(value).replace(/([ #;?%&,.+*~':"!^$\[\]()=>|/@])/g, '\\$1');
    }

    function expandToItem(item) {
        let current = item;
        while (current && current.classList && current.classList.contains('tree-item')) {
            current.classList.add('expanded');
            current = current.parentElement ? current.parentElement.closest('.tree-item') : null;
        }
    }

    function clearDataView() {
        document.getElementById('dataHeaderText').textContent = 'Component Data';
        document.getElementById('dataStatus').textContent = '';
        document.getElementById('dataTabs').innerHTML = '';
        document.getElementById('dataView').innerHTML = '<div class="empty-state">Select an entity or component to inspect data</div>';
        state.dataTabs = [];
        state.activeTabId = null;
    }

    function isGuid(value) {
        const guidPattern = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
        return typeof value === 'string' && guidPattern.test(value);
    }

    function makeValueClickable(value) {
        if (isGuid(value)) {
            return `<span class="data-guid-link" data-guid="${value}">${value}</span>`;
        }
        return value;
    }

    function tryPrettyFormatJson(valueText) {
        try {
            const parsed = JSON.parse(valueText);
            if (typeof parsed === 'object' && parsed !== null) {
                return JSON.stringify(parsed, null, 2);
            }
        } catch (e) {
            // Not valid JSON, return as-is
        }
        return valueText;
    }

    function formatValueForDisplay(value) {
        if (typeof value === 'string') {
            // Try to pretty format if it's valid JSON
            try {
                const parsed = JSON.parse(value);
                if (typeof parsed === 'object' && parsed !== null) {
                    return JSON.stringify(parsed, null, 2);
                }
            } catch (e) {
                // Not valid JSON, return as-is
            }
            return value;
        }
        // For objects/arrays, pretty print them
        if (typeof value === 'object') {
            return JSON.stringify(value, null, 2);
        }
        return String(value);
    }

    function handleGuidLinkClick(e) {
        if (!e.target.classList.contains('data-guid-link')) return;
        e.preventDefault();
        const guid = e.target.dataset.guid;
        if (!guid) return;

        // Try to find as component first
        const componentItem = document.querySelector(`.tree-item[data-type="component"][data-guid="${cssEscape(guid)}"]`);
        if (componentItem) {
            selectTreeItem('component', guid);
            renderDataViewForComponent(guid);
            return;
        }

        // Try to find as entity
        const entityItem = document.querySelector(`.tree-item[data-type="entity"][data-guid="${cssEscape(guid)}"]`);
        if (entityItem) {
            selectTreeItem('entity', guid);
            renderDataViewForEntity(guid);
            return;
        }
    }

    function clearDataView() {
        document.getElementById('dataHeaderText').textContent = 'Component Data';
        document.getElementById('dataStatus').textContent = '';
        document.getElementById('dataTabs').innerHTML = '';
        document.getElementById('dataView').innerHTML = '<div class="empty-state">Select an entity or component to inspect data</div>';
        state.dataTabs = [];
        state.activeTabId = null;
    }

    function summarizeKeyState(activeInstance, allInstances) {
        const stats = new Map();

        allInstances.forEach(instance => {
            Object.entries(instance.component).forEach(([key, value]) => {
                if (!stats.has(key)) stats.set(key, { presentCount: 0, values: new Set() });
                const entry = stats.get(key);
                entry.presentCount += 1;
                entry.values.add(JSON.stringify(value));
            });
        });

        const rows = [];
        Object.entries(activeInstance.component).forEach(([key, value]) => {
            const entry = stats.get(key) || { presentCount: 1, values: new Set([JSON.stringify(value)]) };
            let stateClass = 'row-unique';
            if (entry.presentCount > 1 && entry.values.size === 1) stateClass = 'row-overlap';
            if (entry.values.size > 1) stateClass = 'row-conflict';
            rows.push({ key, value, stateClass });
        });

        rows.sort((a, b) => a.key.localeCompare(b.key));
        return rows;
    }

    function renderDataTable(activeInstance, allInstances) {
        const rows = summarizeKeyState(activeInstance, allInstances);
        if (!rows.length) {
            document.getElementById('dataView').innerHTML = '<div class="empty-state">No scalar data available</div>';
            return;
        }

        const htmlRows = rows.map(row => {
            const formattedValue = formatValueForDisplay(row.value);
            const escapedValue = (formattedValue || '').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            
            // Check if value contains newlines (formatted JSON)
            const isMultiline = escapedValue.includes('\n');
            let cellContent;
            
            if (isMultiline) {
                // For multi-line content, use <pre> tag
                cellContent = `<pre>${escapedValue}</pre>`;
            } else {
                // For single-line content, try to make GUIDs clickable
                cellContent = makeValueClickable(escapedValue);
            }
            
            return `<tr class="${row.stateClass}"><td>${row.key}</td><td>${cellContent}</td></tr>`;
        }).join('');

        document.getElementById('dataView').innerHTML = `
            <table>
                <thead><tr><th>Key</th><th>Value</th></tr></thead>
                <tbody>${htmlRows}</tbody>
            </table>
        `;

        // Attach click handlers to GUID links
        document.getElementById('dataView').addEventListener('click', handleGuidLinkClick);

        const overlapCount = rows.filter(r => r.stateClass === 'row-overlap').length;
        const uniqueCount = rows.filter(r => r.stateClass === 'row-unique').length;
        const conflictCount = rows.filter(r => r.stateClass === 'row-conflict').length;
        document.getElementById('dataStatus').textContent = `same:${overlapCount} unique:${uniqueCount} conflict:${conflictCount}`;
    }

    function isShapeRepresentationInstance(instance) {
        if (!instance?.component) return false;
        const component = instance.component;
        const candidates = [
            component.elementType,
            component.entityType,
            component.type,
            component.ifcType,
            component.className,
            component.RepresentationType,
            component.ObjectDefinition?.entityType,
            component.ObjectDefinition?.elementType,
            component.ObjectDefinition?.type,
            component.ObjectDefinition?.ifcType
        ];

        if (candidates.some(v => typeof v === 'string' && v.toLowerCase().includes('shaperepresentation'))) {
            return true;
        }

        const extracted = extractIfcType(component);
        if (typeof extracted === 'string' && extracted.toLowerCase().includes('shaperepresentation')) {
            return true;
        }

        // Fallback: some payloads only expose this token deep in nested JSON.
        try {
            return JSON.stringify(component).toLowerCase().includes('shaperepresentation');
        } catch (e) {
            return false;
        }
    }

    function applyShapeRepresentationTabVisibility(activeInstance, instances) {
        const hasShapeRepresentation = isShapeRepresentationInstance(activeInstance) || instances.some(isShapeRepresentationInstance);
        if (!hasShapeRepresentation) return;
        const siblingIds = instances.map(instance => instance.instanceId);
        siblingIds.forEach(id => state.visibleInstanceIds.delete(id));
        state.visibleInstanceIds.add(activeInstance.instanceId);
        updateMeshesForVisibility();
        syncTreeCheckboxes();
    }

    function renderDataTabs(instances, headerLabel) {
        const tabsEl = document.getElementById('dataTabs');
        tabsEl.innerHTML = '';
        state.dataTabs = instances.map(instance => ({
            tabId: instance.instanceId,
            label: `Q${(instance.queryIndex ?? instance.component._query ?? 0) + 1} · ${instance.modelName}`,
            instanceId: instance.instanceId
        }));

        if (!state.dataTabs.length) {
            clearDataView();
            return;
        }

        if (!state.activeTabId || !state.dataTabs.some(tab => tab.tabId === state.activeTabId)) {
            state.activeTabId = state.dataTabs[0].tabId;
        }

        document.getElementById('dataHeaderText').textContent = headerLabel;

        state.dataTabs.forEach(tab => {
            const btn = document.createElement('button');
            btn.className = `data-tab${tab.tabId === state.activeTabId ? ' active' : ''}`;
            btn.textContent = tab.label;
            btn.addEventListener('click', () => {
                state.activeTabId = tab.tabId;
                renderDataTabs(instances, headerLabel);
                const activeInstance = state.flat.instancesById.get(tab.instanceId);
                if (activeInstance) {
                    applyShapeRepresentationTabVisibility(activeInstance, instances);
                    selectTreeItem('component', activeInstance.componentGuid, activeInstance.instanceId);
                    renderDataTable(activeInstance, instances);
                }
            });
            tabsEl.appendChild(btn);
        });

        const active = state.flat.instancesById.get(state.activeTabId);
        if (active) renderDataTable(active, instances);
    }

    function renderDataViewForComponent(componentGuid) {
        const instanceIds = state.flat.componentsByGuid.get(componentGuid) || [];
        const instances = instanceIds.map(id => state.flat.instancesById.get(id)).filter(Boolean);
        if (!instances.length) {
            clearDataView();
            return;
        }
        renderDataTabs(instances, `Component ${componentGuid}`);
    }

    function renderDataViewForEntity(entityGuid) {
        const entity = state.flat.entities.get(entityGuid);
        if (!entity) {
            clearDataView();
            return;
        }

        const firstComponentGuid = Array.from(entity.componentGuids.keys())[0];
        if (!firstComponentGuid) {
            clearDataView();
            return;
        }

        const instances = (entity.componentGuids.get(firstComponentGuid) || [])
            .map(id => state.flat.instancesById.get(id))
            .filter(Boolean);

        if (!instances.length) {
            clearDataView();
            return;
        }

        renderDataTabs(instances, `Entity ${entityGuid}`);
    }

    async function executeQueryLine(queryId, fromRepeat = false) {
        const line = state.queryLines.find(q => q.id === queryId);
        if (!line) return;

        const rowEl = document.querySelector(`.query-line[data-id="${queryId}"]`);
        const statusEl = rowEl?.querySelector('.query-status');

        const inputUrl = line.address.trim();
        if (!inputUrl) return;
        const url = normalizeQueryUrl(inputUrl);

        if (statusEl) statusEl.textContent = 'Loading...';
        setStatus(`Running query ${line.index + 1}`, true);

        try {
            const apiData = await fetchJson(url);
            state.rawQueryResults.set(queryId, {
                url,
                data: apiData,
                loadedAt: new Date().toISOString(),
                error: null
            });
            const components = await normalizeApiToComponents(url, apiData);
            const withMeta = components.map(component => ({
                ...component,
                _query: line.index
            }));

            state.queryResults.set(queryId, withMeta);
            line.lastResultCount = withMeta.length;
            line.lastRunAt = new Date();

            if (statusEl) statusEl.textContent = `${withMeta.length} comps`;
            rebuildFlatState();
            renderTree();
            syncTreeCheckboxes();
            updateMeshesForVisibility();
            if (!fromRepeat) zoomToVisible();

            if (state.upperViewMode === 'raw') {
                if (!state.rawActiveQueryId) state.rawActiveQueryId = queryId;
                renderRawDataTabs();
            }

            setStatus(`Loaded ${state.flat.instancesById.size} component instances from ${state.queryResults.size} query line(s)`);
        } catch (error) {
            state.rawQueryResults.set(queryId, {
                url,
                data: null,
                loadedAt: new Date().toISOString(),
                error: error.message
            });
            if (statusEl) statusEl.textContent = 'Error';
            if (state.upperViewMode === 'raw') {
                if (!state.rawActiveQueryId) state.rawActiveQueryId = queryId;
                renderRawDataTabs();
            }
            setStatus(`Error in query ${line.index + 1}: ${error.message}`);
        }
    }

    function stopRepeatTimer(line) {
        if (!line || !line.repeatTimer) return;
        clearInterval(line.repeatTimer);
        line.repeatTimer = null;
    }

    function toggleQueryVisibility(queryId, show) {
        if (!state.flat || !state.flat.instancesById) return;

        state.flat.instancesById.forEach((instance) => {
            if (instance.queryId === queryId) {
                if (show) {
                    state.visibleInstanceIds.add(instance.instanceId);
                } else {
                    state.visibleInstanceIds.delete(instance.instanceId);
                }
            }
        });

        updateMeshesForVisibility();
        syncTreeCheckboxes();
    }

    function renderQueryLines() {
        const container = document.getElementById('queryLines');
        container.innerHTML = '';

        state.queryLines.forEach((line, index) => {
            line.index = index;
            const row = document.createElement('div');
            row.className = 'query-line';
            row.dataset.id = line.id;

            row.innerHTML = `
                <input class="query-input" value="${line.address.replace(/"/g, '&quot;')}" placeholder="Enter REST query URL or /api/...">
                <button class="icon-btn execute-btn" data-tooltip="Execute query">➜</button>
                <button class="icon-btn repeat-btn ${line.repeatEnabled ? 'active' : ''}" data-tooltip="Repeat every 1 minute">⟳</button>
                <button class="icon-btn show-btn" data-tooltip="Show all from this query">👁</button>
                <button class="icon-btn hide-btn" data-tooltip="Hide all from this query">🙈</button>
                <button class="icon-btn delete-btn" data-tooltip="Delete query line">✕</button>
                <span class="query-status">${line.lastResultCount ? `${line.lastResultCount} comps` : 'Idle'}</span>
            `;

            const input = row.querySelector('.query-input');
            const executeBtn = row.querySelector('.execute-btn');
            const repeatBtn = row.querySelector('.repeat-btn');
            const showBtn = row.querySelector('.show-btn');
            const hideBtn = row.querySelector('.hide-btn');
            const deleteBtn = row.querySelector('.delete-btn');

            input.addEventListener('input', (e) => line.address = e.target.value);
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') executeQueryLine(line.id);
            });

            executeBtn.addEventListener('click', () => executeQueryLine(line.id));

            repeatBtn.addEventListener('click', () => {
                line.repeatEnabled = !line.repeatEnabled;
                repeatBtn.classList.toggle('active', line.repeatEnabled);
                if (line.repeatEnabled) {
                    stopRepeatTimer(line);
                    line.repeatTimer = setInterval(() => executeQueryLine(line.id, true), 60000);
                    executeQueryLine(line.id, true);
                } else {
                    stopRepeatTimer(line);
                }
            });

            showBtn.addEventListener('click', () => toggleQueryVisibility(line.id, true));
            hideBtn.addEventListener('click', () => toggleQueryVisibility(line.id, false));
            deleteBtn.addEventListener('click', () => deleteQueryLine(line.id));

            container.appendChild(row);
        });

        if (state.upperViewMode === 'raw') {
            renderRawDataTabs();
        }
    }

    function addQueryLine(address = 'http://localhost:5000/api/components', repeatEnabled = false) {
        const line = {
            id: state.nextQueryId++,
            address,
            repeatEnabled,
            repeatTimer: null,
            lastResultCount: 0,
            lastRunAt: null,
            index: state.queryLines.length
        };
        state.queryLines.push(line);
        renderQueryLines();

        if (repeatEnabled) {
            line.repeatTimer = setInterval(() => executeQueryLine(line.id, true), 60000);
        }

        if (state.upperViewMode === 'raw') {
            state.rawActiveQueryId = line.id;
            renderRawDataTabs();
        }
    }

    function deleteQueryLine(queryId) {
        const idx = state.queryLines.findIndex(q => q.id === queryId);
        if (idx < 0) return;

        const [line] = state.queryLines.splice(idx, 1);
        stopRepeatTimer(line);
        state.queryResults.delete(queryId);
        state.rawQueryResults.delete(queryId);

        if (state.rawActiveQueryId === queryId) {
            state.rawActiveQueryId = state.queryLines.length ? state.queryLines[0].id : null;
        }

        if (!state.queryLines.length) {
            addQueryLine('http://localhost:5000/api/components');
        }

        rebuildFlatState();
        renderQueryLines();
        renderTree();
        syncTreeCheckboxes();
        updateMeshesForVisibility();
        clearDataView();
        if (state.upperViewMode === 'raw') {
            renderRawDataTabs();
        }
    }

    function saveQueryState() {
        const payload = {
            version: 1,
            savedAt: new Date().toISOString(),
            queries: state.queryLines.map(line => ({
                address: line.address,
                repeat: !!line.repeatEnabled
            }))
        };

        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'ifcx-query-state.json';
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        setStatus('Saved query state JSON');
    }

    async function openQueryState(file) {
        const text = await file.text();
        const parsed = JSON.parse(text);
        if (!parsed || !Array.isArray(parsed.queries)) throw new Error('Invalid query state format');

        state.queryLines.forEach(stopRepeatTimer);
        state.queryLines = [];
        state.queryResults.clear();
        state.rawQueryResults.clear();
        state.rawActiveQueryId = null;
        state.flat = { entities: new Map(), componentsByGuid: new Map(), instancesById: new Map() };
        state.visibleInstanceIds.clear();
        state.selectedInstanceId = null;

        parsed.queries.forEach(query => addQueryLine(query.address || '', !!query.repeat));
        if (!state.queryLines.length) addQueryLine('http://localhost:5000/api/components');

        renderQueryLines();
        renderTree();
        clearDataView();
        if (state.upperViewMode === 'raw') renderRawDataTabs();
        setStatus('Loaded query state JSON');
    }

    function setupSplitter() {
        const splitter = document.getElementById('splitter');
        const contentSection = document.querySelector('.content-section');
        const leftPanel = document.querySelector('.left-panel');
        if (!splitter || !contentSection || !leftPanel) return;

        let resizing = false;
        splitter.addEventListener('mousedown', () => {
            resizing = true;
            splitter.classList.add('active');
            document.body.style.cursor = 'col-resize';
            document.body.style.userSelect = 'none';
        });

        document.addEventListener('mousemove', (e) => {
            if (!resizing) return;
            const rect = contentSection.getBoundingClientRect();
            const newWidth = e.clientX - rect.left;
            const minWidth = 280;
            const maxWidth = rect.width - 320;
            if (newWidth > minWidth && newWidth < maxWidth) {
                leftPanel.style.width = `${newWidth}px`;
                leftPanel.style.minWidth = 'unset';
                leftPanel.style.maxWidth = 'unset';
            }
        });

        document.addEventListener('mouseup', () => {
            if (!resizing) return;
            resizing = false;
            splitter.classList.remove('active');
            document.body.style.cursor = 'default';
            document.body.style.userSelect = 'auto';
        });
    }

    function setupHorizontalSplitter() {
        const splitter = document.getElementById('horizontalSplitter');
        const leftPanel = document.querySelector('.left-panel');
        const leftUpper = document.querySelector('.left-upper');
        if (!splitter || !leftPanel || !leftUpper) return;

        let resizing = false;
        splitter.addEventListener('mousedown', () => {
            resizing = true;
            splitter.classList.add('active');
            document.body.style.cursor = 'row-resize';
            document.body.style.userSelect = 'none';
        });

        document.addEventListener('mousemove', (e) => {
            if (!resizing) return;
            const rect = leftPanel.getBoundingClientRect();
            const newHeight = e.clientY - rect.top;
            const minHeight = 180;
            const maxHeight = rect.height - 140;
            if (newHeight > minHeight && newHeight < maxHeight) {
                leftUpper.style.flex = '0 0 ' + newHeight + 'px';
            }
        });

        document.addEventListener('mouseup', () => {
            if (!resizing) return;
            resizing = false;
            splitter.classList.remove('active');
            document.body.style.cursor = 'default';
            document.body.style.userSelect = 'auto';
        });
    }

    function clearAllSceneMeshes() {
        objects3d.forEach(mesh => scene.remove(mesh));
        objects3d.clear();
        selectedMeshes.clear();
        meshOriginalColors.clear();
    }

    function setupMenuActions() {
        document.getElementById('treeViewTabBtn').addEventListener('click', () => setUpperViewMode('tree'));
        document.getElementById('rawViewTabBtn').addEventListener('click', () => setUpperViewMode('raw'));
        document.getElementById('addQueryBtn').addEventListener('click', () => addQueryLine('http://localhost:5000/api/components'));
        document.getElementById('saveQueriesBtn').addEventListener('click', saveQueryState);
        document.getElementById('openQueriesBtn').addEventListener('click', () => document.getElementById('openQueriesInput').click());

        document.getElementById('openQueriesInput').addEventListener('change', async (e) => {
            const file = e.target.files?.[0];
            if (!file) return;
            try {
                await openQueryState(file);
                clearAllSceneMeshes();
            } catch (error) {
                setStatus(`Open failed: ${error.message}`);
            } finally {
                e.target.value = '';
            }
        });
    }

    window.addEventListener('load', () => {
        init3DViewer();
        setupSplitter();
        setupHorizontalSplitter();
        setupMenuActions();
        addQueryLine('http://localhost:5000/api/components');
        setUpperViewMode('tree');
        renderTree();
        clearDataView();
    });

    document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
            clearTreeAndMeshSelection();
            clearDataView();
        }
    });
</script>
</body>
</html>
